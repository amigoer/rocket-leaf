# Feel free to remove those if you don't want/need to use them.
# Make sure to check the documentation at https://nfpm.goreleaser.com
#
# The lines below are called `modelines`. See `:help modeline`

name: "rocket-leaf"
arch: ${GOARCH}
platform: "linux"
version: "0.1.0"
section: "default"
priority: "extra"
maintainer: "Rocket Leaf Maintainers <opensource@rocketleaf.dev>"
description: "RocketMQ desktop management client"
vendor: "Rocket Leaf"
homepage: "https://github.com/codermast/rocket-leaf"
license: "MIT"
release: "1"

contents:
  - src: "./bin/rocket-leaf"
    dst: "/usr/local/bin/rocket-leaf"
  - src: "./build/appicon.png"
    dst: "/usr/share/icons/hicolor/128x128/apps/rocket-leaf.png"
  - src: "./build/linux/rocket-leaf.desktop"
    dst: "/usr/share/applications/rocket-leaf.desktop"

# Default dependencies for Debian 12/Ubuntu 22.04+ with WebKit 4.1
depends:
  - libgtk-3-0
  - libwebkit2gtk-4.1-0

# Distribution-specific overrides for different package formats and WebKit versions
overrides:
  rpm:
    depends:
      - gtk3
      - webkit2gtk4.1

  archlinux:
    depends:
      - gtk3
      - webkit2gtk-4.1

scripts:
  postinstall: "./build/linux/nfpm/scripts/postinstall.sh"
