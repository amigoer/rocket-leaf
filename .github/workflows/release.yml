name: 跨平台发布构建

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  WAILS_VERSION: v3.0.0-alpha.71
  NODE_VERSION: "20"

jobs:
  validate-tag:
    name: 校验标签格式
    runs-on: ubuntu-latest
    outputs:
      valid: ${{ steps.check.outputs.valid }}
    steps:
      - name: 校验是否为 vX.Y.Z
        id: check
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo "标签格式正确：$TAG"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "::warning::标签 $TAG 不符合 vX.Y.Z（如 v1.0.0），跳过构建和打包。"
          fi

  build-linux:
    name: Linux 打包
    runs-on: ubuntu-latest
    needs: validate-tag
    if: needs.validate-tag.outputs.valid == 'true'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装 Linux 构建依赖
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            fakeroot \
            rpm

      - name: 安装 Task
        uses: arduino/setup-task@v2

      - name: 安装 Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: 执行 Linux 打包
        run: task --taskfile build/linux/Taskfile.yml package

      - name: 收集 Linux 产物
        shell: bash
        run: |
          mkdir -p release-artifacts/linux
          cp -v bin/*.AppImage release-artifacts/linux/ 2>/dev/null || true
          cp -v bin/*.deb release-artifacts/linux/ 2>/dev/null || true
          cp -v bin/*.rpm release-artifacts/linux/ 2>/dev/null || true
          cp -v bin/*.pkg.tar.zst release-artifacts/linux/ 2>/dev/null || true
          cp -v bin/rocket-leaf release-artifacts/linux/ 2>/dev/null || true
          test -n "$(ls -A release-artifacts/linux)"

      - name: 上传 Linux 产物
        uses: actions/upload-artifact@v4
        with:
          name: package-linux
          path: release-artifacts/linux/*
          if-no-files-found: error

  build-macos:
    name: macOS 打包
    runs-on: macos-latest
    needs: validate-tag
    if: needs.validate-tag.outputs.valid == 'true'
    env:
      MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装 Task
        uses: arduino/setup-task@v2

      - name: 安装 Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: 导入 macOS 签名证书
        if: env.MACOS_CERTIFICATE_P12 != '' && env.MACOS_CERTIFICATE_PASSWORD != ''
        shell: bash
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/macos-certificate.p12"
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security create-keychain -p temp-pass "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p temp-pass "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temp-pass "$KEYCHAIN_PATH"

      - name: 执行 macOS 通用包打包
        run: task --taskfile build/darwin/Taskfile.yml package:universal

      - name: 重新签名 macOS 应用
        if: env.MACOS_SIGN_IDENTITY != ''
        shell: bash
        run: |
          APP_PATH="bin/rocket-leaf.app"
          codesign --force --deep --options runtime --sign "$MACOS_SIGN_IDENTITY" "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: 公证 macOS 应用
        if: env.MACOS_SIGN_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_TEAM_ID != '' && env.APPLE_APP_PASSWORD != ''
        shell: bash
        run: |
          APP_PATH="bin/rocket-leaf.app"
          ZIP_PATH="$RUNNER_TEMP/rocket-leaf-macos-universal.app.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple "$APP_PATH"

      - name: 收集 macOS 产物
        shell: bash
        run: |
          mkdir -p release-artifacts/macos
          if [ -d "bin/rocket-leaf.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent "bin/rocket-leaf.app" "release-artifacts/macos/rocket-leaf-macos-universal.app.zip"
          fi
          cp -v bin/rocket-leaf release-artifacts/macos/ 2>/dev/null || true
          test -n "$(ls -A release-artifacts/macos)"

      - name: 上传 macOS 产物
        uses: actions/upload-artifact@v4
        with:
          name: package-macos
          path: release-artifacts/macos/*
          if-no-files-found: error

  build-windows:
    name: Windows 打包
    runs-on: windows-latest
    needs: validate-tag
    if: needs.validate-tag.outputs.valid == 'true'
    env:
      WINDOWS_CERTIFICATE_PFX: ${{ secrets.WINDOWS_CERTIFICATE_PFX }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      WINDOWS_TIMESTAMP_SERVER: ${{ secrets.WINDOWS_TIMESTAMP_SERVER }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装 NSIS
        shell: powershell
        run: |
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: 安装 Task
        uses: arduino/setup-task@v2

      - name: 安装 Wails CLI
        shell: powershell
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@${env:WAILS_VERSION}
          "$(go env GOPATH)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: 导入 Windows 签名证书
        if: env.WINDOWS_CERTIFICATE_PFX != '' && env.WINDOWS_CERTIFICATE_PASSWORD != ''
        shell: powershell
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP 'windows-signing-cert.pfx'
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX))
          "WINDOWS_CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: 执行 Windows 打包
        shell: powershell
        run: task --taskfile build/windows/Taskfile.yml package

      - name: 签名 Windows 产物
        if: env.WINDOWS_CERTIFICATE_PFX != '' && env.WINDOWS_CERTIFICATE_PASSWORD != ''
        shell: powershell
        run: |
          $signtool = (Get-Command signtool.exe -ErrorAction Stop).Source
          $timestamp = $env:WINDOWS_TIMESTAMP_SERVER
          if ([string]::IsNullOrWhiteSpace($timestamp)) {
            $timestamp = 'http://timestamp.digicert.com'
          }
          $targets = @()
          if (Test-Path 'bin/rocket-leaf.exe') { $targets += 'bin/rocket-leaf.exe' }
          Get-ChildItem 'bin' -Filter 'rocket-leaf-*-installer.exe' -File -ErrorAction SilentlyContinue | ForEach-Object { $targets += $_.FullName }
          Get-ChildItem 'bin' -Filter 'rocket-leaf-*.msix' -File -ErrorAction SilentlyContinue | ForEach-Object { $targets += $_.FullName }
          if ($targets.Count -eq 0) {
            throw '未找到可签名的 Windows 产物'
          }
          foreach ($file in $targets) {
            & $signtool sign /fd SHA256 /f $env:WINDOWS_CERT_PATH /p $env:WINDOWS_CERTIFICATE_PASSWORD /tr $timestamp /td SHA256 $file
          }

      - name: 收集 Windows 产物
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts/windows | Out-Null
          if (Test-Path 'bin/rocket-leaf.exe') {
            Copy-Item 'bin/rocket-leaf.exe' release-artifacts/windows/ -Force
          }
          Get-ChildItem 'bin' -Filter 'rocket-leaf-*-installer.exe' -File -ErrorAction SilentlyContinue | Copy-Item -Destination release-artifacts/windows -Force
          Get-ChildItem 'bin' -Filter 'rocket-leaf-*.msix' -File -ErrorAction SilentlyContinue | Copy-Item -Destination release-artifacts/windows -Force
          if (-not (Get-ChildItem release-artifacts/windows -File -ErrorAction SilentlyContinue)) {
            throw '未找到 Windows 构建产物'
          }

      - name: 上传 Windows 产物
        uses: actions/upload-artifact@v4
        with:
          name: package-windows
          path: release-artifacts/windows/*
          if-no-files-found: error

  release:
    name: 发布 GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - build-linux
      - build-macos
      - build-windows
    if: needs.validate-tag.outputs.valid == 'true'
    permissions:
      contents: write
    steps:
      - name: 下载全部产物
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: release-files

      - name: 查看产物列表
        shell: bash
        run: |
          echo "将发布以下文件："
          find release-files -type f | sort

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-files/**/*
